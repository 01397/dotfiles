"$schema" = 'https://starship.rs/config-schema.json'

palette = 'my_palette'

# Which is equivalent to
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$aws\
$kubernetes\
$gcloud\
$openstack\
$azure\
$nats\
$mise\
$crystal\
$custom\
$sudo\
$fill \
$status\
$cmd_duration\
$time\
$line_break\
$jobs\
$os\
$container\
$character"""


[palettes.my_palette]
black      = "#0f1720"
red        = "#ff6b6b"
green      = "#9ece6a"
yellow     = "#e0af68"
blue       = "#7aa2f7"
magenta    = "#bb9af7"
cyan       = "#7dcfff"
white      = "#c0caf5"
fg_primary = "#ffffff"
fg_text    = "#c0caf5"
bg_git     = "#006699"

bright_black   = "#6b7089"
bright_red     = "#ff7a7a"
bright_green   = "#bfe67b"
bright_yellow  = "#ffd47a"
bright_blue    = "#88b4ff"
bright_magenta = "#caa9ff"
bright_cyan    = "#9be7ff"
bright_white   = "#ffffff"

bg_base    = "#132e78"
foreground = "#cdd6f4"


[kubernetes]
disabled = false
symbol   = "ŅĀØ "
format   = "[$symbol$context]($style) "

[cmd_duration]
min_time           = 2000
format             = "[¾░ÜŁ ($duration )]($style)"
show_notifications = false
min_time_to_notify = 1000

[directory]
truncation_length      = 8
truncate_to_repo       = true
format                 = "[ $path( $read_only) ]($style)"
style                  = 'bg:bg_base fg:fg_text'
repo_root_format       = "[ ]($style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[ ]($style)"
before_repo_root_style = 'bg:bg_base fg:fg_text'
repo_root_style        = 'bg:bg_base fg:fg_primary bold'
read_only              = "’ĆŻ"

[git_branch]
format        = "[ŅéČ](bg:bg_base fg:bg_git)[ $symbol $branch(:$remote_branch)]($style)"
style         = "bold bg:bg_git fg:#ffffff"
symbol        = "Ņ£ź"
only_attached = true

[git_commit]
format        = "[ŅéČ](bg:bg_base fg:bg_git)[ Ņ½╝ $hash$tag]($style)"
style         = "bold bg:bg_git fg:#ffffff"
tag_symbol    = " ’ÉÆ "
only_detached = true
tag_disabled  = false

[git_state]
style = "bg:yellow"

[git_status]
style       = "bg:#888888"
format      = "[($staged$conflicted) ($ahead_behind )($modified$renamed$untracked$deleted$typechanged) ](bg:bg_git fg:white)[Ņé┤](fg:bg_git)([]($style)) "
staged      = "+"
conflicted  = "!"
modified    = "[’æä](bg:bg_git fg:yellow)"
untracked   = "[’æä](bg:bg_git fg:green)"
renamed     = "[’æä](bg:bg_git fg:green)"
deleted     = "[’æä](bg:bg_git fg:red)"
typechanged = "[’æä](bg:bg_git fg:yellow)"
ahead       = '${count}¾░üØ'
behind      = '${count}¾░üģ'
diverged    = '${behind_count}¾░üģ ${ahead_count}¾░üØ'

[aws]
force_display = true

[gcloud]
disabled = true

[mise]
disabled         = false
format           = "([ $health ](bg:yellow))"
healthy_symbol   = ""
unhealthy_symbol = "Ņ®¼ Run `mise doctor`"

[fill]
symbol = "’æø"
style  = "bold #444444"

[status]
disabled = false
symbol   = "’ö░ "

[time]
disabled = false
format   = "’ĆŚ [$time]($style) "
